<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alua Engine - Select Your Environment</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --efi-blue: #0078d4;
            --kernel-purple: #8a2be2;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
            z-index: -1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ffffff, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .container {
            display: flex;
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            flex: 1;
            min-width: 300px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #8b949e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* EFI 版樣式 */
        .card.efi:hover {
            box-shadow: 0 0 20px rgba(0, 120, 212, 0.3);
            border-color: var(--efi-blue);
        }

        /* Kernel 版樣式 */
        .card.kernel:hover {
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
            border-color: var(--kernel-purple);
        }

        .card h2 {
            font-size: 1.8rem;
            margin-top: 0;
        }

        .card p {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .efi .btn { background-color: var(--efi-blue); color: white; }
        .kernel .btn { background-color: var(--kernel-purple); color: white; }

        .tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #30363d;
            margin-bottom: 15px;
            display: inline-block;
        }

        footer {
            margin-top: 60px;
            color: #484f58;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <header>
        <h1>ALUA ENGINE</h1>
        <p>請選擇您的運行環境架構</p>
    </header>

    <main class="container">
        
        <a href="Alua-EFI_edk2-ver.html" class="card efi">
            <div>
                <span class="tag">Firmware Layer</span>
                <h2>Alua for EFI</h2>
                <p>基於 EDK2 開發，直接運行於 UEFI 環境。</p>
            </div>
            <div class="btn">進入說明頁面</div>
        </a>

        <a href="AluaKernel-ver.html" class="card kernel">
            <div>
                <span class="tag">OS Layer</span>
                <h2>Alua Kernel</h2>
                <p>Alua OS 核心版本。提供更完整的系統調用、多工處理支援及進階記憶體管理架構。</p>
            </div>
            <div class="btn">進入說明頁面</div>
        </a>

    </main>

    <footer>
        &copy; 2026 Alua Project | Last Updated: 2026/03/26
    </footer>

</body>
</html>
